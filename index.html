<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universa AI</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">🛰️ Universa</div>
            <button onclick="newChat()" class="btn-new">✏️ New Chat</button>
            <div class="chat-list" id="chatList"></div>
            <div class="sidebar-footer">
                <button onclick="toggleLogbook()" class="btn-log">📜 Logbook</button>
                <div id="logbookContainer" style="display:none; margin-top: 10px;">
                    <div id="logbookEntries"></div>
                    <button onclick="clearLogbook()" class="btn-clear">Clear Logs</button>
                </div>
                <button onclick="toggleMaster()" class="btn-master">🔑 Master</button>
                <div id="masterContainer" style="display:none; margin-top: 10px;">
                    <input type="password" id="passkeyInput" placeholder="Enter passkey...">
                    <button onclick="verifyPasskey()">Unlock</button>
                </div>
                <button onclick="clearMemory()" class="btn-clear">🧹 Clear Memory</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <div class="header">
                <span id="engineDisplay">Universa Standard Engine</span>
                <span id="statusDisplay">🟢 Connected</span>
            </div>
            <div class="chat-area" id="chatArea"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Send command to Universa..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
